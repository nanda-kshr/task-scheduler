name: GhostTask CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint Check
      run: npm run lint

    - name: Verify TypeScript Type Safety
      run: npx tsc --noEmit

    - name: Execute Vitest Test Suite
      run: npm run test

    - name: Build Next.js Production stand-alone
      run: npm run build
      env:
        MONGO_URI: mongodb://dummy-uri:27017/db
        NEXT_TELEMETRY_DISABLED: 1
